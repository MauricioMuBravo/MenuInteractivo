<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Mundial 2026 - Milenio Pro</title>
    <style>
        :root { 
            --mex-green: #00ef00; --usa-blue: #007bff; --can-red: #ff0000; --neon: #00f2ff;
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; overflow-x: hidden; overflow-y: auto;
        }
        body { font-family: 'Arial Black', sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #ui { position: relative; z-index: 10; width: 100%; padding: 30px 5%; box-sizing: border-box; }
        .layout-container { max-width: 900px; margin: 0 auto; position: relative; }

        .main-header {
            text-align: center; font-size: clamp(30px, 10vw, 60px);
            text-transform: uppercase; -webkit-text-stroke: 1.5px #fff; color: transparent;
            margin-bottom: 40px;
        }

        /* --- CLASE MAESTRA PARA ELEMENTOS INTERACTIVOS --- */
        .interactive-box {
            position: relative; border: 2px solid #fff; border-radius: 10px;
            background: rgba(0,0,0,0.75); overflow: hidden;
            backdrop-filter: blur(8px); transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; text-decoration: none; color: #fff;
            display: flex; align-items: center;
        }

        .interactive-box:hover, .interactive-box:active { transform: scale(1.02); z-index: 20; }
        
        /* Colores Bandera */
        .color-mex:hover, .color-mex:active { border-color: var(--mex-green); box-shadow: 0 0 20px var(--mex-green); background: rgba(0, 104, 71, 0.5); }
        .color-usa:hover, .color-usa:active { border-color: var(--usa-blue); box-shadow: 0 0 20px var(--usa-blue); background: rgba(0, 40, 104, 0.5); }
        .color-can:hover, .color-can:active { border-color: var(--can-red); box-shadow: 0 0 20px var(--can-red); background: rgba(239, 51, 64, 0.5); }

        /* Estilo Botones Menú */
        .btn-menu { height: 80px; padding: 0 25px; margin-bottom: 12px; justify-content: space-between; }
        .btn-menu h3 { margin: 0; font-size: 1.3rem; text-transform: uppercase; z-index: 2; }

        /* EL BALÓN VECTORIZADO */
        .ball-icon {
            height: 120%;
            position: absolute;
            right: -10px;
            opacity: 0.4;
            pointer-events: none;
            transition: transform 0.5s ease, opacity 0.3s;
            animation: spin 10s linear infinite;
        }
        .interactive-box:hover .ball-icon {
            opacity: 0.9;
            animation: spin 2s linear infinite; /* Se acelera al pasar el mouse */
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Multimedia */
        .box-media { aspect-ratio: 16/9; display: block; margin-top: 15px; }
        .box-media img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .box-media:hover img { opacity: 1; }

        .tag { position: absolute; top: 12px; left: 12px; font-size: 0.7rem; background: #000; padding: 3px 12px; border: 1px solid #fff; z-index: 5; }

        .trophy-img { height: clamp(200px, 30vh, 380px); filter: drop-shadow(0 0 25px gold); display: block; margin: 0 auto; }

        .banner-final {
            border: 2px solid var(--neon); background: rgba(0,0,0,0.9);
            padding: 30px; border-radius: 12px; text-align: center;
            font-size: 2.5rem; font-weight: 900; margin-top: 40px;
        }

        .main-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 850px) { .main-grid { grid-template-columns: 1.3fr 1fr; } }
        .video-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        @media (min-width: 600px) { .video-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1 class="main-header">COPA MUNDIAL</h1>

        <div class="layout-container">
            
            <div class="main-grid">
                <div class="menu-col">
                    <a href="https://www.milenio.com/futbol-internacional/mundial/calendario" target="_blank" class="interactive-box btn-menu color-mex" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3>CALENDARIO</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://stage2-front.milenio.com/futbol-internacional/mundial/estadisticas" target="_blank" class="interactive-box btn-menu color-usa" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3>ESTADÍSTICAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://www.milenio.com/deportes/futbol-internacional/mundial" target="_blank" class="interactive-box btn-menu color-can" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3>NOTICIAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_blank" class="interactive-box btn-menu color-mex" style="border-color:#4f4;" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3 style="color:#4f4">MUNDIALITO</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                </div>
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/en/e/ec/FIFA_World_Cup_Trophy.png" class="trophy-img">
                </div>
            </div>

            <div class="video-grid">
                <div class="interactive-box box-media color-usa" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                    <span class="tag">VIDEOS</span>
                    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=500">
                </div>
                <div class="menu-col" style="margin-top:15px">
                    <a href="#" class="interactive-box btn-menu color-can" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3>INFOGRAFÍA</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="#" class="interactive-box btn-menu color-mex" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                        <h3>LOS BALONES</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                </div>
            </div>

            <div class="video-grid">
                <div class="interactive-box box-media color-usa" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                    <span class="tag">RAÍCES</span>
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=500">
                </div>
                <div class="interactive-box box-media color-can" onmouseenter="playFIFA()" ontouchstart="playFIFA()">
                    <span class="tag">HISTÓRICO</span>
                    <img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=500">
                </div>
            </div>

            <div class="banner-final">
                <span style="color:var(--mex-green)">MEX</span> <span>CAN</span> <span style="color:var(--usa-blue)">USA</span>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playFIFA() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(850, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.06);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.06);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.06);
        }
    </script>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';
        let scene, camera, renderer;
        function init() {
            scene = new THREE.Scene();
            const loader = new THREE.TextureLoader();
            loader.load('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200', (t) => { scene.background = t; });
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 15);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        }
        init();
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
