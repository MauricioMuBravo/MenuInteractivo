<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Mundial 2026 - Milenio</title>
    <style>
        :root { 
            --mex-green: #A0D825; --usa-blue: #2755D5; --can-red: #ED4866; --neon-cyan: #00f2ff;
        }
        
        /* 1. RESET Y ESTILOS BASE */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; color: #fff; font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        html { 
            background: #000 url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_ESTADIO.jpg') no-repeat center top / cover fixed;
        }

        body { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: relative; z-index: 10; width: 100%; max-width: 950px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .main-header-img { display: block; width: 100%; height: auto; margin-bottom: 30px; }

        /* 2. GRIDS DE TARJETAS (MANTENIDO) */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; perspective: 1000px; }
        .card-wrapper { position: relative; cursor: pointer; transition: 0.3s; transform-style: preserve-3d; }
        
        .neon-frame { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; z-index: 3; transition: 0.4s; }
        .card-content { 
            position: relative; height: 170px; border-radius: 18px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-size: cover !important; background-position: center !important;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .card-content::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.85)); z-index: 1; }
        .icon-shield { width: 60px; margin-bottom: 10px; position: relative; z-index: 2; }
        .card-content span { font-weight: bold; z-index: 2; letter-spacing: 1px; font-size: 0.85rem; text-transform: uppercase; }
        
        .card-wrapper:nth-child(3n+1):hover .neon-frame { border-color: var(--mex-green); box-shadow: 0 0 15px var(--mex-green); }
        .card-wrapper:nth-child(3n+2):hover .neon-frame { border-color: var(--usa-blue); box-shadow: 0 0 15px var(--usa-blue); }
        .card-wrapper:nth-child(3n+3):hover .neon-frame { border-color: var(--can-red); box-shadow: 0 0 15px var(--can-red); }

        .bg-1 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_1.png'); }
        .bg-2 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_2.png'); }
        .bg-3 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_3.png'); }

        /* 3. BLOQUE FUTBOLITO Y TRIVIA CON GLOW SWEEP (EL "RECORRIDO") */
        .futbolito-main-container {
            position: relative; width: 100%; min-height: 480px;
            background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/FondoJuego.png') center/cover;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden; margin-bottom: 40px; padding: 40px; box-sizing: border-box;
            display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px;
        }

        .game-header { grid-column: 1 / -1; margin-bottom: 10px; }
        .game-header h2 { font-family: 'Arial Black', sans-serif; font-size: 2.2rem; margin: 0; color: #fff; text-transform: uppercase; }
        .game-header p { margin: 5px 0 0; font-size: 1.1rem; opacity: 0.9; }

        .trivia-container { grid-column: 1; display: flex; flex-direction: column; justify-content: center; z-index: 10; }
        
        /* CONTENEDOR DE TRIVIA CON EFECTO SWEEP */
        .trivia-box {
            position: relative;
            width: 100%; max-width: 440px; aspect-ratio: 16 / 9;
            background: #000; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; text-align: center;
            overflow: hidden; 
        }

        /* --- EFECTO "BOLITA QUE RECORRE" (GLOW SWEEP) --- */
        .trivia-glow-sweep {
            position: absolute;
            inset: -2px; /* Ligeramente más grande para que el borde se vea */
            border-radius: 17px;
            background: conic-gradient(from 0deg, transparent 0%, transparent 40%, var(--neon-cyan) 50%, transparent 60%, transparent 100%);
            opacity: 0;
            z-index: 1;
            pointer-events: none;
            filter: blur(2px); /* Suavizar la "bolita" */
        }

        /* Máscara para que el sweep solo sea visible en el borde */
        .trivia-glow-mask {
            position: absolute;
            inset: 3px; /* Grosor del borde */
            background: #000;
            border-radius: 13px;
            z-index: 2;
        }

        /* Clase activadora del efecto */
        .run-glow-sweep .trivia-glow-sweep {
            opacity: 1;
            animation: sweep-run 0.8s linear forwards;
        }

        @keyframes sweep-run {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .trivia-content-dynamic {
            position: relative;
            padding: 25px; box-sizing: border-box;
            transition: opacity 0.5s ease-in-out;
            width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center;
            z-index: 5; /* Por encima de la máscara y el sweep */
        }

        .trivia-box h3 { font-size: 1.2rem; margin: 0 0 20px; line-height: 1.2; text-transform: uppercase; }
        .trivia-options { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .option-btn { padding: 8px 18px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .option-btn:hover { background: rgba(255,255,255,0.2); border-color: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }

        .action-container { grid-column: 2; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; }
        .btn-juega-ahora {
            display: inline-block; padding: 15px 40px; background: #ff4d4d;
            color: #fff; font-weight: bold; font-size: 1.3rem; text-decoration: none;
            border-radius: 10px; box-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            transition: 0.3s; position: relative; z-index: 20; text-transform: uppercase;
        }
        .btn-juega-ahora:hover { transform: scale(1.05); background: #ff1a1a; box-shadow: 0 0 30px #ff1a1a; }
        .character-portrait { position: absolute; bottom: -40px; right: -20px; height: 420px; z-index: 5; pointer-events: none; }

        .iframe-container {
            width: 100%; border-radius: 20px; overflow: hidden;
            background: #000; border: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px;
        }
        .video-slider-iframe { width: 100%; height: 500px; border: none; display: block; }
        .reels-iframe { width: 100%; height: 650px; border: none; display: block; }

        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
            .futbolito-main-container { grid-template-columns: 1fr; padding: 20px; min-height: auto; }
            .trivia-container { grid-column: 1; align-items: center; margin-bottom: 20px; }
            .action-container { grid-column: 1; padding-bottom: 120px; }
            .character-portrait { height: 280px; right: -10px; }
        }
    </style>
</head>
<body onclick="initAllAudios()">

    <div id="canvas-container"></div>

    <audio id="ambient-audio" loop><source src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/EstadioAmbiente.mp3"></audio>
    <audio id="select-audio"><source src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Button%20Selection%2005.mp3"></audio>

    <div id="ui">
        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/MEXUSACANM.png" class="main-header-img">

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/calendario')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield">
                    <span>CALENDARIO</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/estadisticas')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield">
                    <span>ESTADÍSTICAS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/temas/mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield">
                    <span>NOTICIAS</span>
                </div>
            </div>
        </div>

        <div class="futbolito-main-container">
            <div class="game-header">
                <h2>FUTBOLITO MILENIO</h2>
                <p>Solo para verdaderos aficionados.</p>
            </div>

            <div class="trivia-container">
                <div class="trivia-box" id="trivia-box">
                    <div class="trivia-glow-sweep"></div> <div class="trivia-glow-mask"></div> <div class="trivia-content-dynamic" id="trivia-content-dynamic">
                        <h3 id="question-text">¿QUIÉN GANÓ EL MUNDIAL DE ITALIA 90?</h3>
                        <div class="trivia-options" id="options-container"></div>
                    </div>
                </div>
            </div>

            <div class="action-container">
                <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" class="btn-juega-ahora" onclick="playSelectSound()">JUEGA AHORA »</a>
                <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/portero.png" class="character-portrait">
            </div>
        </div>

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/estadios-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield">
                    <span>ESTADIOS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/figuras-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield">
                    <span>FIGURAS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/seleccion-mexicana')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield">
                    <span>FIGURAS MÉXICO</span>
                </div>
            </div>
        </div>

        <div class="iframe-container">
            <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" class="video-slider-iframe" scrolling="no"></iframe>
        </div>

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/historia-balones-mundiales')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield">
                    <span>BALONES</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/bracket-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield">
                    <span>BRACKET</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield">
                    <span>VER MÁS</span>
                </div>
            </div>
        </div>

        <div class="iframe-container">
            <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/MIX/Videos-verticales.html" class="reels-iframe" scrolling="no"></iframe>
        </div>
    </div>

    <script>
        const ambientSnd = document.getElementById('ambient-audio');
        const selectSnd = document.getElementById('select-audio');
        const targetURL = "https://stage2-front.milenio.com/deportes/mundialito-milenio";

        function initAllAudios() { if(ambientSnd.paused) ambientSnd.play().catch(e=>{}); }
        function playSelectSound() { selectSnd.currentTime = 0; selectSnd.play().catch(e=>{}); }

        function handleNav(element, url) {
            playSelectSound();
            element.style.transform = "rotateY(360deg)";
            element.style.transition = "0.7s cubic-bezier(0.4, 0, 0.2, 1)";
            setTimeout(() => { window.top.location.href = url; }, 600);
        }

        const triviaPool = [
            { q: "¿QUIÉN GANÓ EL MUNDIAL DE ITALIA 90?", opts: ["Italia", "Alemania", "Argentina"] },
            { q: "¿PAÍS CON MÁS MUNDIALES GANADOS?", opts: ["Alemania", "Brasil", "Italia"] },
            { q: "¿QUIÉN MARCÓ EL 'GOL DEL SIGLO'?", opts: ["Pelé", "Maradona", "Zidane"] },
            { q: "¿AÑO DEL PRIMER MUNDIAL DE FUTBOL?", opts: ["1930", "1950", "1914"] },
            { q: "¿GANADOR DEL MUNDIAL QATAR 2022?", opts: ["Francia", "Argentina", "Croacia"] }
        ];

        let currentIndex = 0;

        function updateTrivia() {
            const dynamic = document.getElementById('trivia-content-dynamic');
            const qText = document.getElementById('question-text');
            const container = document.getElementById('options-container');
            const triviaBox = document.getElementById('trivia-box');

            dynamic.style.opacity = 0;

            setTimeout(() => {
                const item = triviaPool[currentIndex];
                qText.innerText = item.q;
                container.innerHTML = "";
                
                // Limpiar sweep previo
                triviaBox.classList.remove('run-glow-sweep');

                item.opts.forEach(opt => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => { 
                        playSelectSound();
                        
                        // DISPARAR RESPLANDOR SWEEP (La "bolita")
                        triviaBox.classList.add('run-glow-sweep');
                        
                        // Esperar un momento para que se vea el recorrido antes de navegar
                        setTimeout(() => { window.top.location.href = targetURL; }, 800);
                    };
                    container.appendChild(btn);
                });

                dynamic.style.opacity = 1;
                currentIndex = (currentIndex + 1) % triviaPool.length;
            }, 500);
        }

        setInterval(updateTrivia, 5000);
        window.addEventListener('load', updateTrivia);
    </script>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<450; i++) pos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.12 }));
        scene.add(stars); camera.position.z = 45;
        function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.0006; renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
