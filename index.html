<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Mundial 2026 - Milenio</title>
    <style>
        :root { 
            --mex-green: #A0D825; --usa-blue: #2755D5; --can-red: #ED4866; --neon-cyan: #00f2ff;
        }
        
        /* FONDO Y PARTICULAS */
        html { background: #000 url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_ESTADIO.jpg') no-repeat center top / cover fixed; }
        body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; color: #fff; font-family: 'Arial', sans-serif; overflow-x: hidden;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        }

        #particles-js { position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: 1; pointer-events: none; }
        
        /* CONTENEDOR PRINCIPAL */
        #ui { 
            position: relative; 
            z-index: 10; 
            width: 100%; 
            max-width: 950px; 
            margin: 0 auto; 
            padding: 80px 20px 20px 20px; 
            box-sizing: border-box; 
        }

        /* LOGO */
        .main-header-img { 
            display: block; 
            width: 120%; 
            max-width: 1100px;
            height: auto; 
            margin: 0 auto 40px auto; 
            transform: translateX(-8.5%); 
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        /* GRIDS */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card-wrapper { position: relative; cursor: pointer; transition: transform 0.3s ease; }
        .card-wrapper:hover { transform: translateY(-5px); }
        .neon-frame { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; z-index: 3; transition: 0.3s; }
        
        .card-mex:hover .neon-frame { border-color: var(--mex-green); box-shadow: 0 0 15px var(--mex-green); }
        .card-usa:hover .neon-frame { border-color: var(--usa-blue); box-shadow: 0 0 15px var(--usa-blue); }
        .card-can:hover .neon-frame { border-color: var(--can-red); box-shadow: 0 0 15px var(--can-red); }

        .card-content { position: relative; height: 170px; border-radius: 18px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; background-size: cover !important; border: 1px solid rgba(255,255,255,0.1); }
        .card-content::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.85)); z-index: 1; }
        .icon-shield { width: 60px; margin-bottom: 10px; position: relative; z-index: 2; }
        .card-content span { font-weight: bold; z-index: 2; font-size: 0.85rem; text-transform: uppercase; }

        /* FUTBOLITO */
        .futbolito-main-container { 
            position: relative; width: 100%; min-height: 480px; 
            background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/FondoJuego.png') no-repeat center/cover; 
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); overflow: hidden; margin-bottom: 40px; padding: 30px; box-sizing: border-box; 
            display: flex; flex-direction: column; justify-content: space-between; 
        }
        
        .game-header { position: relative; z-index: 5; text-align: left; }
        .game-header h2 { font-size: 2rem; margin: 0; font-weight: bold; }
        .game-header p { margin: 5px 0 0; font-size: 1.1rem; }
        
        .bottom-controls { display: flex; align-items: flex-end; justify-content: space-between; z-index: 10; width: 100%; }
        .trivia-container { flex: 1.2; }
        .action-container { flex: 0.8; text-align: right; margin-left: 40px; }

        .trivia-box { position: relative; width: 100%; background: rgba(0, 0, 0, 0.85); border-radius: 15px; border: 1px solid var(--neon-cyan); padding: 15px; text-align: center; box-sizing: border-box; }
        .option-btn { padding: 6px 12px; border: 1px solid var(--neon-cyan); border-radius: 20px; background: rgba(0, 242, 255, 0.1); color: #fff; cursor: pointer; transition: 0.3s; font-size: 0.8rem; margin: 4px; }
        .option-btn:hover { background: var(--neon-cyan); color: #000; }

        .btn-juega-ahora { animation: pulse-juega 1.8s infinite ease-in-out; display: inline-block; cursor: pointer; }
        .btn-juega-ahora img { width: 280px; filter: drop-shadow(0 0 15px var(--can-red)); }
        
        @keyframes pulse-juega { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* WRAPPER DEL VIDEO */
        .video-wrapper { 
            width: 100%; 
            margin: 0 auto 50px; 
            border-radius: 15px; 
            overflow: hidden; 
            background: transparent; 
        }

        iframe { width: 100%; border: none; display: block; }

        /* MOBILE */
        @media (max-width: 768px) {
            #ui { padding-top: 60px; }
            .main-header-img { width: 100%; transform: none; margin-bottom: 25px; }
            .grid-3 { grid-template-columns: 1fr; }
            .futbolito-main-container { 
                min-height: 520px; 
                background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/FutbolitomilenioMobi.png') no-repeat center/cover;
                padding: 20px;
            }
            .bottom-controls { flex-direction: column; align-items: center; gap: 15px; width: 100%; }
            .trivia-container, .action-container { width: 100%; text-align: center; margin-left: 0; }
            .btn-juega-ahora img { width: 220px; }
            .video-wrapper iframe.slider-iframe { height: 780px !important; }
        }

        /* FONDOS TARJETAS */
        .bg-1 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_1.png'); }
        .bg-2 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_2.png'); }
        .bg-3 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_3.png'); }
        .bg-4 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_4.png'); }
        .bg-5 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_5.png'); }
        .bg-6 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_6.png'); }
        .bg-7 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_7.png'); }
        .bg-8 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_8.png'); }
        .bg-9 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_9.png'); }
    </style>
</head>
<body>

    <div id="particles-js"></div>
    
    <audio id="select-audio" preload="auto">
        <source src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Button%20Selection%2005.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Logo2026M.png" class="main-header-img">

        <div class="grid-3">
            <div class="card-wrapper card-mex" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/calendario')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield"><span>CALENDARIO</span></div>
            </div>
            <div class="card-wrapper card-usa" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/estadisticas')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield"><span>ESTADÍSTICAS</span></div>
            </div>
            <div class="card-wrapper card-can" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/temas/mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield"><span>NOTICIAS</span></div>
            </div>
        </div>

        <div class="futbolito-main-container">
            <div class="game-header">
                <h2>FUTBOLITO MILENIO</h2>
                <p>Solo para verdaderos aficionados.</p>
            </div>
            <div class="bottom-controls">
                <div class="trivia-container">
                    <div class="trivia-box">
                        <h3 id="question-text" style="font-size: 1rem; margin: 0 0 10px 0;">¿QUIÉN MARCÓ EL PRIMER GOL?</h3>
                        <div class="trivia-options" id="options-container"></div>
                    </div>
                </div>
                <div class="action-container">
                    <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" class="btn-juega-ahora" onmouseenter="playSelectSound()" onclick="playSelectSound()" target="_top">
                        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Juega_Ahora.png">
                    </a>
                </div>
            </div>
        </div>

        <div class="grid-3">
            <div class="card-wrapper card-mex" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/estadios-mundial-2026')">
                <div class="neon-frame"></div><div class="card-content bg-4"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadio.png" class="icon-shield"><span>ESTADIOS</span></div>
            </div>
            <div class="card-wrapper card-usa" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/figuras-mundial-2026')">
                <div class="neon-frame"></div><div class="card-content bg-5"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield"><span>FIGURAS</span></div>
            </div>
            <div class="card-wrapper card-can" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/seleccion-mexicana')">
                <div class="neon-frame"></div><div class="card-content bg-6"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield"><span>FIGURAS DE MÉXICO</span></div>
            </div>
        </div>

        <div class="video-wrapper" style="max-width:920px;">
            <iframe class="slider-iframe" src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" style="height: 580px;" scrolling="no"></iframe>
        </div>

        <div class="grid-3">
            <div class="card-wrapper card-mex" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/historia-balones-mundiales')">
                <div class="neon-frame"></div><div class="card-content bg-7"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_corriendo.png" class="icon-shield"><span>BALONES</span></div>
            </div>
            <div class="card-wrapper card-usa" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/bracket-mundial-2026')">
                <div class="neon-frame"></div><div class="card-content bg-8"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_balones.png" class="icon-shield"><span>BRACKET</span></div>
            </div>
            <div class="card-wrapper card-can" onmouseenter="playSelectSound()" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol')">
                <div class="neon-frame"></div><div class="card-content bg-9"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estrellas.png" class="icon-shield"><span>VER MÁS</span></div>
            </div>
        </div>

        <div class="video-wrapper" style="max-width:950px;">
            <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/MIX/Videos-verticalesMenu.html" style="height:650px;" scrolling="no"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        const audio = document.getElementById('select-audio');
        function playSelectSound() { 
            if(audio) { 
                audio.pause(); 
                audio.currentTime = 0; 
                audio.play().catch(() => {}); 
            } 
        }

        function handleNav(element, url) { 
            playSelectSound(); 
            element.style.transform = "scale(0.95)"; 
            setTimeout(() => { window.top.location.href = url; }, 200); 
        }
        
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 15 },
                "color": { "value": "#00f2ff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3 },
                "size": { "value": 4 },
                "move": { "enable": true, "speed": 1.5 }
            }
        });

        const triviaPool = [
            { q: "¿QUIÉN MARCÓ EL PRIMER GOL?", opts: ["Laurent", "Stabile", "Nasazzi"] }, 
            { q: "¿MÁS MUNDIALES GANADOS?", opts: ["Alemania", "Brasil", "Italia"] }
        ];
        let currentIndex = 0;
        function updateTrivia() {
            const qText = document.getElementById('question-text');
            const container = document.getElementById('options-container');
            const item = triviaPool[currentIndex];
            if(qText) qText.innerText = item.q; 
            if(container) {
                container.innerHTML = "";
                item.opts.forEach(opt => {
                    const btn = document.createElement('button'); 
                    btn.className = 'option-btn'; 
                    btn.innerText = opt;
                    btn.onmouseenter = () => { playSelectSound(); }; // AGREGADO SONIDO HOVER
                    btn.onclick = () => { 
                        playSelectSound(); 
                        setTimeout(() => { window.top.location.href = "https://stage2-front.milenio.com/deportes/mundialito-milenio"; }, 300); 
                    };
                    container.appendChild(btn);
                });
            }
            currentIndex = (currentIndex + 1) % triviaPool.length;
        }
        setInterval(updateTrivia, 6000);
        window.addEventListener('load', updateTrivia);
    </script>
</body>
</html>
