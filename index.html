 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Milenio - Estadio Completo</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; }

        /* EL FONDO 3D */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* LA INTERFAZ CON SCROLL */
        #ui {
            position: relative; 
            width: 100%; 
            height: 100vh;
            z-index: 10;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            overflow-y: auto;          
            padding: 20px 0 100px 0;    
            box-sizing: border-box;    
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
        }

        /* Evita que las filas se encojan */
        .layout-rows > div { flex-shrink: 0; }

        h1 {
            color: #fff; font-size: clamp(20px, 4vw, 35px); text-transform: uppercase; font-style: italic;
            margin: 10px 0 20px 0; text-shadow: 0 0 20px #00f2ff; letter-spacing: 6px;
            text-align: center;
        }

        .layout-rows {
            display: flex; flex-direction: column; gap: 20px;
            width: 95%; max-width: 1200px;
        }

        .tiles-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }

        /* SLIDER PRINCIPAL */
        .slider-row {
            width: 100%; height: 350px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 242, 255, 0.4);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }
        .slider-row iframe { width: 100%; height: 100%; border: none; }

        /* CARRUSEL DE REELS */
        .reels-container-row {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 12px;
            padding: 10px 0;
            display: flex; align-items: center;
        }

        .reels-wrapper {
            display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth;
            padding: 10px 40px; scrollbar-width: none;
        }
        .reels-wrapper::-webkit-scrollbar { display: none; }

        .reel-card {
            min-width: 160px; aspect-ratio: 9/16; background-size: cover;
            background-position: center;
            border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            position: relative; cursor: pointer; flex-shrink: 0; transition: 0.3s;
            overflow: hidden;
        }
        .reel-card:hover { transform: scale(1.05); border-color: #00f2ff; }
        
        /* ESTILO PARA EL VIDEO DENTRO DEL REEL */
        .reel-card iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            object-fit: cover; /* IMPORTANTE: Para que llene la tarjeta */
        }

        .play-btn-mini {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 45px; height: 45px; background: rgba(0, 242, 255, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 50%; border: 1px solid #fff; display: flex; justify-content: center; align-items: center;
            z-index: 2;
        }
        .play-icon-mini { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 12px solid #fff; margin-left: 3px; }

        .nav-arrow {
            position: absolute; background: rgba(0,0,0,0.8); border: 1px solid #00f2ff;
            color: #00f2ff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 15;
            transition: 0.3s;
        }
        .nav-arrow:hover { background: #00f2ff; color: #000; }
        .arrow-left { left: 5px; }
        .arrow-right { right: 5px; }

        /* TILES INFERIORES */
        .tile {
            position: relative; height: 120px; overflow: hidden;
            background: rgba(15, 15, 15, 0.75); border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); border-radius: 8px; transition: 0.3s ease; cursor: pointer;
            text-decoration: none; display: block;
        }
        .tile:hover { transform: scale(1.03); border-color: #00f2ff; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .tile img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .tile-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: #fff; box-sizing: border-box; }
        .tile-info h2 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        @media (max-width: 700px) {
            .tiles-row { grid-template-columns: 1fr; }
            .slider-row { height: 250px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1>COPA MILENIO</h1>
        
        <div class="layout-rows">
            <div class="tiles-row">
                <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_blank" class="tile">
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=400">
                    <div class="tile-info"><h2>Juego</h2></div>
                </a>
                <div class="tile">
                    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=400">
                    <div class="tile-info"><h2>Raíces</h2></div>
                </div>
                <a href="https://stage2-front.milenio.com/futbol-internacional/mundial/estadisticas" target="_blank" class="tile">
                    <img src="https://images.unsplash.com/photo-1529900948632-5a63961744ad?q=80&w=400">
                    <div class="tile-info"><h2>Estadísticas</h2></div>
                </a>
            </div>

            <div class="slider-row">
                <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/Milenio-Deportes/Short-Deportes.html" allow="autoplay"></iframe>
            </div>

            <div class="reels-container-row">
                <button class="nav-arrow arrow-left" onclick="scrollReels(-300)">&#10094;</button>
                <div id="reels-wrapper" class="reels-wrapper"></div>
                <button class="nav-arrow arrow-right" onclick="scrollReels(300)">&#10095;</button>
            </div>

            <div class="tiles-row">
                <a href="https://www.milenio.com/deportes/futbol-internacional/mundial" target="_blank" class="tile">
                    <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=400">
                    <div class="tile-info"><h2>Sitio Web</h2></div>
                </a>
                <div class="tile" id="video-btn">
                    <img src="https://images.unsplash.com/photo-1431324155629-1a6eda1eedfa?q=80&w=400">
                    <div class="tile-info"><h2>Videos (Playlist)</h2></div>
                </div>
                <div class="tile">
                    <img src="https://images.unsplash.com/photo-1560272564-c83b66b1ad12?q=80&w=400">
                    <div class="tile-info"><h2>Zona Fans</h2></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        // --- LÓGICA DEL CARRUSEL ---
        const videoIds = [
            '69eba327e451af70e0b413a3',
            '69eba3270d2b82aae531651b',
            '69eba326c0e3f4f578e9c127'
        ];
        const fullList = [...videoIds, ...videoIds, ...videoIds]; // Más items para probar el scroll
        const wrapper = document.getElementById('reels-wrapper');

        fullList.forEach(id => {
            const card = document.createElement('div');
            card.className = 'reel-card';
            card.style.backgroundImage = `url('https://mdstrm.com/embed/${id}/thumbnail')`;
            
            // Botón inicial
            card.innerHTML = `<div class="play-btn-mini"><div class="play-icon-mini"></div></div>`;
            
            card.onclick = () => {
                // Al hacer clic, reemplazamos el contenido por el iframe directamente
                card.innerHTML = `<iframe src="https://mdstrm.com/embed/${id}?autoplay=true" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            };
            wrapper.appendChild(card);
        });

        window.scrollReels = (dist) => {
            wrapper.scrollBy({ left: dist, behavior: 'smooth' });
        };

        // --- THREE.JS FONDO (Simplificado para rendimiento) ---
        let scene, camera, renderer, clouds = [];
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 14);
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const loader = new THREE.TextureLoader();
            const grassTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
            grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
            grassTex.repeat.set(8, 12);
            
            const grassMat = new THREE.MeshPhongMaterial({ map: grassTex, color: 0x1a331a });
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 150), grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = -5;
            scene.add(grass);

            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pLight = new THREE.PointLight(0x00f2ff, 2.5, 60);
            pLight.position.set(0, 15, 5);
            scene.add(pLight);

            const cloudTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lensflare/lensflare0.png');
            for(let i=0; i<8; i++) {
                const cloud = new THREE.Mesh(new THREE.PlaneGeometry(50, 50), new THREE.MeshBasicMaterial({ map: cloudTex, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending }));
                cloud.position.set(Math.random()*100-50, Math.random()*20, Math.random()*-40);
                scene.add(cloud);
                clouds.push(cloud);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            clouds.forEach(c => { c.position.x += 0.01; if(c.position.x > 60) c.position.x = -60; });
            renderer.render(scene, camera);
        }

        init();
        animate();

        // Eventos
        document.getElementById('video-btn').onclick = () => window.open('https://youtube.com/playlist?list=PLVsGsrV660j59z-ze5n1MO9HA4c2OfbYW', '_blank');
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
