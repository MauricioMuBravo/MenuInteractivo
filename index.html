<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Mundial 2026 - Milenio Pro</title>
    <style>
        :root { 
            --mex-green: #006847; --usa-blue: #002868; --can-red: #ef3340; --neon: #00f2ff;
        }
        
        /* SCROLL ACTIVO */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; overflow-x: hidden; overflow-y: auto;
        }
        body { font-family: 'Arial Black', sans-serif; color: #fff; scroll-behavior: smooth; }

        /* FONDO 3D SIEMPRE DETRÁS */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* CONTENIDO QUE FLOTA */
        #ui { position: relative; z-index: 10; width: 100%; padding: 40px 5%; box-sizing: border-box; }
        .layout-container { max-width: 900px; margin: 0 auto; position: relative; }

        .main-header {
            text-align: center; font-size: clamp(35px, 8vw, 60px);
            text-transform: uppercase; -webkit-text-stroke: 2px #fff; color: transparent;
            margin-bottom: 50px;
        }

        /* NÚMEROS GIGANTES DE FONDO */
        .bg-number {
            position: absolute; font-size: 18rem; color: rgba(255,255,255,0.07);
            z-index: -1; font-weight: 900; line-height: 0.8; pointer-events: none;
        }

        /* BOTONES CON COLORES DE BANDERA */
        .btn-cap {
            position: relative; height: 80px; background: rgba(0,0,0,0.75);
            border: 2px solid #fff; border-radius: 8px;
            display: flex; align-items: center; padding: 0 25px;
            text-decoration: none; color: #fff; margin-bottom: 15px;
            overflow: hidden; backdrop-filter: blur(10px); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        /* Hover Colores */
        .btn-mex:hover { border-color: #00ef00; background: rgba(0, 104, 71, 0.5); transform: translateX(10px); box-shadow: 0 0 20px #00ef00; }
        .btn-usa:hover { border-color: #007bff; background: rgba(0, 40, 104, 0.5); transform: translateX(10px); box-shadow: 0 0 20px #007bff; }
        .btn-can:hover { border-color: #ff0000; background: rgba(239, 51, 64, 0.5); transform: translateX(10px); box-shadow: 0 0 20px #ff0000; }

        .btn-cap h3 { margin: 0; font-size: 1.3rem; text-transform: uppercase; z-index: 2; }
        .btn-cap img.ball { position: absolute; right: -15px; height: 110%; opacity: 0.15; transition: 0.5s; }
        .btn-cap:hover img.ball { transform: rotate(90deg); opacity: 0.4; }

        /* GRIDS DE CONTENIDO */
        .main-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 30px; }
        .video-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        .box-video {
            position: relative; border: 2px solid #fff; border-radius: 12px;
            aspect-ratio: 16/9; background: #000; overflow: hidden; cursor: pointer;
        }
        .box-video img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.3s; }
        .box-video:hover img { opacity: 1; transform: scale(1.05); }
        .tag { position: absolute; top: 12px; left: 12px; font-size: 0.8rem; background: #000; padding: 4px 12px; border: 1px solid #fff; z-index: 5; }

        /* FOOTER / MEXCANUSA */
        .footer-reels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 40px 0; }
        .reel-thumb { border: 2px solid #fff; border-radius: 10px; aspect-ratio: 9/16; background: #222; overflow: hidden; }
        
        .mexcanusa-banner {
            border: 3px solid var(--neon); background: rgba(0,0,0,0.9);
            padding: 40px; border-radius: 15px; display: flex; justify-content: center;
            gap: 20px; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900;
        }

        /* JUGADOR FLOTANTE */
        .player-img { position: absolute; left: -120px; top: 450px; height: 450px; z-index: 15; pointer-events: none; }

        @media (max-width: 850px) { .main-grid, .video-grid, .footer-reels { grid-template-columns: 1fr; } .player-img { display: none; } }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1 class="main-header">COPA MUNDIAL</h1>

        <div class="layout-container">
            <div class="bg-number" style="right: 0; top: -20px;">2</div>

            <div class="main-grid">
                <div class="menu-col">
                    <a href="https://www.milenio.com/futbol-internacional/mundial/calendario" target="_blank" class="btn-cap btn-mex" onmouseenter="playFIFA()">
                        <h3>CALENDARIO</h3><img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" class="ball">
                    </a>
                    <a href="https://stage2-front.milenio.com/futbol-internacional/mundial/estadisticas" target="_blank" class="btn-cap btn-usa" onmouseenter="playFIFA()">
                        <h3>ESTADÍSTICAS</h3><img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" class="ball">
                    </a>
                    <a href="https://www.milenio.com/deportes/futbol-internacional/mundial" target="_blank" class="btn-cap btn-can" onmouseenter="playFIFA()">
                        <h3>NOTICIAS</h3><img src="https://upload.wikimedia.org/wikipedia/commons/d/d3/Soccerball.svg" class="ball">
                    </a>
                    <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_blank" class="btn-cap" style="border-color:#4f4; background: linear-gradient(90deg, rgba(0,255,0,0.15), transparent);" onmouseenter="playFIFA()">
                        <h3 style="color:#4f4">MUNDIALITO MILENIO</h3>
                    </a>
                </div>
                <div style="display:flex; justify-content:center; align-items:center;">
                    <img src="https://upload.wikimedia.org/wikipedia/en/e/ec/FIFA_World_Cup_Trophy.png" style="height:380px; filter: drop-shadow(0 0 30px gold);">
                </div>
            </div>

            <div class="video-grid">
                <div class="box-video" onmouseenter="playFIFA()"><span class="tag">VIDEOS</span><img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=500"></div>
                <div class="menu-col">
                    <a href="#" class="btn-cap btn-mex" onmouseenter="playFIFA()"><h3>INFOGRAFÍA</h3></a>
                    <a href="#" class="btn-cap btn-usa" onmouseenter="playFIFA()"><h3>LOS BALONES</h3></a>
                </div>
            </div>

            <div class="bg-number" style="left: -30px; top: 750px;">6</div>

            <div class="video-grid">
                <div class="box-video" onmouseenter="playFIFA()"><span class="tag">RAÍCES</span><img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=500"></div>
                <div class="box-video" onmouseenter="playFIFA()"><span class="tag">HISTÓRICO</span><img src="https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=500"></div>
            </div>

            <div class="footer-reels">
                <div class="reel-thumb"><img src="https://images.unsplash.com/photo-1511886929837-354d827aae26?q=80&w=300" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="reel-thumb"><img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=300" style="width:100%; height:100%; object-fit:cover;"></div>
                <div class="reel-thumb"><img src="https://images.unsplash.com/photo-1551952237-954a0e68786c?q=80&w=300" style="width:100%; height:100%; object-fit:cover;"></div>
            </div>

            <div class="mexcanusa-banner">
                <span style="color:#00ef00">MEX</span><span>CAN</span><span style="color:#007bff">USA</span>
            </div>

            <img src="https://ouch-cdn2.icons8.com/mO2O6H6IOn_Qy_G762LIsA9O7S9QW5Z3nB2g3v_e5mU/rs:fit:368:487/czM6Ly9pY29uczgu/b3VjaC1wcm9kLmFz/c2V0cy9zdmcvMjYv/Y2I5MzFmYzUtMDQy/OS00YzVkLTliOTYt/ZDM0YjY0ZDI4ZGY5/LnN2Zw.png" class="player-img">
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playFIFA() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(550, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }
    </script>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';
        let scene, camera, renderer;

        function init() {
            scene = new THREE.Scene();
            const loader = new THREE.TextureLoader();
            loader.load('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=1200', (t) => { scene.background = t; });

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const grassTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
            grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping; grassTex.repeat.set(5, 5);
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshPhongMaterial({ map: grassTex, color: 0x1a331a }));
            grass.rotation.x = -Math.PI/2; grass.position.y = -5;
            scene.add(grass);
            scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        }
        init(); 
        function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
        animate();
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
