<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Mundial 2026 - Portal Final</title>
    <style>
        :root { 
            --mex-green: #00ef00; --usa-blue: #007bff; --can-red: #ff0000; --neon: #00f2ff;
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; overflow-x: hidden; overflow-y: auto;
            scroll-behavior: smooth;
        }
        body { font-family: 'Arial Black', sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }

        /* Fondo de Partículas */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* Interfaz de Usuario */
        #ui { position: relative; z-index: 10; width: 100%; padding: 20px 5%; box-sizing: border-box; }
        .layout-container { max-width: 1000px; margin: 0 auto; position: relative; }

        .main-header {
            text-align: center; font-size: clamp(30px, 10vw, 60px);
            text-transform: uppercase; -webkit-text-stroke: 1.5px #fff; color: transparent;
            margin-bottom: 20px;
        }

        /* --- CAJAS INTERACTIVAS --- */
        .interactive-box {
            position: relative; border: 2px solid #fff; border-radius: 12px;
            background-color: #111; background-size: cover; background-position: center;
            overflow: hidden; cursor: pointer; text-decoration: none; color: #fff;
            display: flex; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .interactive-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.3) 100%);
            z-index: 1; transition: opacity 0.3s;
        }
        .interactive-box:hover::before { opacity: 0.5; }
        .interactive-box:hover { transform: scale(1.01); z-index: 20; }
        
        .border-mex:hover { border-color: var(--mex-green); box-shadow: 0 0 20px var(--mex-green); }
        .border-usa:hover { border-color: var(--usa-blue); box-shadow: 0 0 20px var(--usa-blue); }
        .border-can:hover { border-color: var(--can-red); box-shadow: 0 0 20px var(--can-red); }

        .btn-menu { height: 85px; margin-bottom: 12px; padding: 0 25px; }
        .btn-menu h3 { margin: 0; font-size: 1.1rem; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }

        .ball-icon {
            height: 110%; position: absolute; right: -15px;
            opacity: 0.3; z-index: 2; pointer-events: none; filter: grayscale(1);
        }

        .bg-mun { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/MUNDIALITO%20/futbolitobot.png'); background-size: cover; background-position: center; }

        .top-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; }

        /* WRAPPERS DE CONTENIDO - SOLUCIÓN PARA FIJAR LA VISTA */
        .video-full-wrapper { 
            width: 100%; height: 500px; border: 2px solid #fff; border-radius: 15px; 
            overflow: hidden; margin: 20px 0; background: #000;
            position: relative;
            contain: layout; /* Aísla el contenido para que no afecte al scroll padre */
        }
        
        #video-frame { 
            width: 100%; height: 100%; border: none; background: transparent;
        }

        .reels-wrapper { 
            width: 100%; height: 620px; border: 2px solid #fff; border-radius: 15px; 
            overflow: hidden; margin: 30px 0; background: transparent;
        }

        .lower-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-horizontal { height: 90px; justify-content: flex-start; padding-left: 25px; }
        
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box-small { height: 150px; justify-content: center; text-align: center; }
        .box-small h3 { z-index: 2; font-size: 1.6rem; text-shadow: 2px 2px 10px #000; }
        
        .trophy-img { height: clamp(200px, 30vh, 350px); filter: drop-shadow(0 0 25px gold); display: block; margin: 0 auto; }

        .bg-cal { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/1.png'); }
        .bg-est { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/2.png'); }
        .bg-not { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/3.png'); }

        .mexcanusa-banner {
            border: 3px solid var(--neon); background: rgba(0,0,0,0.9);
            padding: 20px; border-radius: 15px; display: flex; justify-content: center;
            gap: 15px; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; margin-top: 30px; margin-bottom: 40px;
        }

        @media (max-width: 768px) {
            .top-grid, .lower-buttons-grid, .footer-grid { grid-template-columns: 1fr; }
            .video-full-wrapper { height: 450px; }
            .reels-wrapper { height: 520px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1 class="main-header">COPA MUNDIAL</h1>

        <div class="layout-container">
            <div class="top-grid">
                <div class="menu-col">
                    <a href="https://www.milenio.com/futbol-internacional/mundial/calendario" target="_parent" class="interactive-box btn-menu bg-cal border-mex" onmouseenter="playSfx()">
                        <h3>CALENDARIO</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://stage2-front.milenio.com/futbol-internacional/mundial/estadisticas" target="_parent" class="interactive-box btn-menu bg-est border-usa" onmouseenter="playSfx()">
                        <h3>ESTADÍSTICAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://www.milenio.com/deportes/futbol-internacional/mundial" target="_parent" class="interactive-box btn-menu bg-not border-can" onmouseenter="playSfx()">
                        <h3>NOTICIAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_parent" class="interactive-box btn-menu bg-mun border-mex" onmouseenter="playSfx()"></a>
                </div>
                <div style="display: flex; align-items: center; justify-content: center;">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/copa.png" class="trophy-img">
                </div>
            </div>

            <div class="video-full-wrapper">
                <iframe 
                    id="video-frame" 
                    src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" 
                    allow="autoplay; fullscreen"
                    loading="eager"
                    tabindex="-1">
                </iframe>
            </div>

            <div class="lower-buttons-grid">
                <a href="https://www.milenio.com/infografias" target="_parent" class="interactive-box btn-horizontal border-can" onmouseenter="playSfx()">
                    <h3>INFOGRAFÍA</h3>
                    <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                </a>
                <a href="https://www.milenio.com/temas/seleccion-mexicana" target="_parent" class="interactive-box btn-horizontal border-mex" onmouseenter="playSfx()">
                    <h3>LOS BALONES</h3>
                    <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                </a>
            </div>

            <div class="reels-wrapper">
                <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/MIX/Vid-vertical-MMB.html"></iframe>
            </div>

            <div class="footer-grid">
                <div class="interactive-box box-small border-usa" 
                     style="background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=500');" 
                     onmouseenter="playSfx()"
                     onclick="changeSection('raices')">
                    <h3>RAÍCES</h3>
                </div>
                <div class="interactive-box box-small border-can" 
                     style="background-image: url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=500');" 
                     onmouseenter="playSfx()"
                     onclick="changeSection('historico')">
                    <h3>HISTÓRICO</h3>
                </div>
            </div>

            <div class="mexcanusa-banner">
                <span style="color:var(--mex-green)">MEX</span><span>CAN</span><span style="color:var(--usa-blue)">USA</span>
            </div>
        </div>
    </div>

    <script>
        // SCRIPT PARA BLOQUEAR EL SALTO AL HACER CLIC
        let userScrollPos = window.scrollY;

        // Registramos la posición del scroll constantemente
        window.addEventListener('scroll', () => {
            userScrollPos = window.scrollY;
        }, { passive: true });

        // Si el iframe intenta forzar un scroll hacia arriba, lo bloqueamos
        const iframe = document.getElementById('video-frame');
        
        // Esta función se activa cuando cambias de sección manualmente
        function changeSection(section) {
            if(section === 'raices') {
                iframe.src = "https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html#raices"; 
            } else if(section === 'historico') {
                iframe.src = "https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html#historico";
            }
            
            // Forzamos a que la pantalla se quede donde estaba
            setTimeout(() => {
                window.scrollTo({ top: userScrollPos, behavior: 'instant' });
            }, 50);
        }

        // Bloqueo preventivo de saltos por foco automático
        window.addEventListener('blur', () => {
            if (document.activeElement === iframe) {
                setTimeout(() => {
                    window.scrollTo({ top: userScrollPos, behavior: 'instant' });
                }, 0);
            }
        });

        // SFX Simple
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    </script>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<2000; i++) pos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const points = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.1 }));
        scene.add(points);
        camera.position.z = 30;
        function animate() { requestAnimationFrame(animate); points.rotation.y += 0.0008; renderer.render(scene, camera); }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
