<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Mundial 2026</title>
    <style>
        :root { 
            --mex-green: #00ef00; --usa-blue: #007bff; --can-red: #ff0000; --neon: #00f2ff;
        }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; overflow-x: hidden; overflow-y: auto;
        }
        body { font-family: 'Arial Black', sans-serif; color: #fff; -webkit-tap-highlight-color: transparent; }

        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        #ui { position: relative; z-index: 10; width: 100%; padding: 30px 5%; box-sizing: border-box; }
        .layout-container { max-width: 1000px; margin: 0 auto; position: relative; }

        .main-header {
            text-align: center; font-size: clamp(30px, 10vw, 60px);
            text-transform: uppercase; -webkit-text-stroke: 1.5px #fff; color: transparent;
            margin-bottom: 40px;
        }

        /* --- CAJAS INTERACTIVAS --- */
        .interactive-box {
            position: relative; border: 2px solid #fff; border-radius: 12px;
            background-color: #111; background-size: cover; background-position: center;
            overflow: hidden; cursor: pointer; text-decoration: none; color: #fff;
            display: flex; align-items: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .interactive-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }
        .interactive-box:hover { transform: scale(1.02); z-index: 20; border-color: var(--neon); }

        .border-mex:hover { border-color: var(--mex-green); box-shadow: 0 0 20px var(--mex-green); }
        .border-usa:hover { border-color: var(--usa-blue); box-shadow: 0 0 20px var(--usa-blue); }
        .border-can:hover { border-color: var(--can-red); box-shadow: 0 0 20px var(--can-red); }

        .btn-menu { height: 85px; margin-bottom: 12px; padding: 0 25px; }
        .btn-menu h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; z-index: 2; }

        .ball-icon {
            height: 110%; position: absolute; right: -15px;
            opacity: 0.4; z-index: 2; pointer-events: none;
            animation: spin 12s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- CONTENEDORES DE VIDEO --- */
        .video-full-wrapper {
            width: 100%; height: 580px; border: 2px solid #fff; border-radius: 15px;
            overflow: hidden; margin: 20px 0; background: #fff; 
        }
        
        /* Sección de Reels (Shorts) */
        .reels-wrapper {
            width: 100%; height: 450px; border: 2px solid #fff; border-radius: 15px;
            overflow: hidden; margin: 30px 0; background: #000;
        }

        @media (max-width: 768px) {
            .video-full-wrapper { height: 450px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
            .reels-wrapper { height: 350px; }
        }
        
        iframe { width: 100%; height: 100%; border: none; }

        .lower-buttons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-horizontal { height: 100px; justify-content: center; text-align: center; }

        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .box-small { height: 180px; }
        .tag { position: absolute; top: 10px; left: 10px; font-size: 0.7rem; background: #000; padding: 3px 10px; border: 1px solid #fff; z-index: 5; }
        
        .trophy-img { height: clamp(250px, 35vh, 380px); filter: drop-shadow(0 0 30px gold); display: block; margin: 0 auto; }

        .mexcanusa-banner {
            border: 3px solid var(--neon); background: rgba(0,0,0,0.9);
            padding: 30px; border-radius: 15px; display: flex; justify-content: center;
            gap: 20px; font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; margin-bottom: 50px;
        }

        .bg-cal { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Media1.jpg'); }
        .bg-est { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Media2.jpg'); }
        .bg-not { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/media3.jpg'); }
        .bg-mun { background-image: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/MUNDIALITO%20/LOGOMUNDIALITOM.png'); background-size: contain; background-repeat: no-repeat; background-position: right; background-color: #000; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1 class="main-header">COPA MUNDIAL</h1>

        <div class="layout-container">
            
            <div style="display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px;">
                <div class="menu-col">
                    <a href="https://www.milenio.com/temas/mundial-2026" target="_parent" class="interactive-box btn-menu bg-cal border-mex" onmouseenter="playSfx()">
                        <h3>CALENDARIO</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://www.milenio.com/deportes" target="_parent" class="interactive-box btn-menu bg-est border-usa" onmouseenter="playSfx()">
                        <h3>ESTADÍSTICAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://www.milenio.com/ultimas-noticias" target="_parent" class="interactive-box btn-menu bg-not border-can" onmouseenter="playSfx()">
                        <h3>NOTICIAS</h3>
                        <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon">
                    </a>
                    <a href="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/index.html" target="_parent" class="interactive-box btn-menu bg-mun border-mex" onmouseenter="playSfx()">
                        <h3 style="color:#4f4">MUNDIALITO</h3>
                    </a>
                </div>
                <div style="display: flex; align-items: center;">
                    <img src="https://upload.wikimedia.org/wikipedia/en/e/ec/FIFA_World_Cup_Trophy.png" class="trophy-img">
                </div>
            </div>

            <div class="video-full-wrapper">
                <span class="tag" style="background: red;">VIDEOS</span>
                <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" scrolling="yes"></iframe>
            </div>

            <div class="lower-buttons-grid">
                <a href="https://www.milenio.com/infografias" target="_parent" class="interactive-box btn-horizontal border-can" onmouseenter="playSfx()">
                    <h3>INFOGRAFÍA</h3>
                    <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon" style="height: 80%; opacity: 0.2;">
                </a>
                <a href="https://www.milenio.com/temas/seleccion-mexicana" target="_parent" class="interactive-box btn-horizontal border-mex" onmouseenter="playSfx()">
                    <h3>LOS BALONES</h3>
                    <img src="https://cdnpublicidad.milenio.com/2025/PublicidadEditorial/05.Mayo/slider-yt/ProyectoMundial2026/Juego_vectores/balon.png" class="ball-icon" style="height: 80%; opacity: 0.2;">
                </a>
            </div>

            <div class="reels-wrapper">
                <span class="tag" style="background: #000;">REELS DEPORTES</span>
                <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/Milenio-Deportes/Short-Deportes.html"></iframe>
            </div>

            <div class="footer-grid">
                <div class="interactive-box box-small border-usa" style="background-image: url('https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=500');" onmouseenter="playSfx()"><span class="tag">RAÍCES</span></div>
                <div class="interactive-box box-small border-can" style="background-image: url('https://images.unsplash.com/photo-1522778119026-d647f0596c20?q=80&w=500');" onmouseenter="playSfx()"><span class="tag">HISTÓRICO</span></div>
            </div>

            <div class="mexcanusa-banner">
                <span style="color:var(--mex-green)">MEX</span><span>CAN</span><span style="color:var(--usa-blue)">USA</span>
            </div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
    </script>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        let renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const geo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0; i<2000; i++) {
            pos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        }
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
        const mat = new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.1 });
        const points = new THREE.Points(geo, mat);
        scene.add(points);

        camera.position.z = 30;
        function animate() {
            requestAnimationFrame(animate);
            points.rotation.y += 0.0008;
            renderer.render(scene, camera);
        }
        animate();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
