<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copa Milenio - Estadio Completo</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        body { font-family: 'Segoe UI', Arial, sans-serif; }

        /* EL FONDO 3D */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* LA INTERFAZ */
        #ui {
            position: relative; width: 100%; height: 100vh; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
            overflow-y: auto; padding: 20px 0;
        }

        h1 {
            color: #fff; font-size: clamp(20px, 4vw, 35px); text-transform: uppercase; font-style: italic;
            margin: 10px 0 20px 0; text-shadow: 0 0 20px #00f2ff; letter-spacing: 6px;
            text-align: center;
        }

        .layout-rows {
            display: flex; flex-direction: column; gap: 15px;
            width: 90%; max-width: 1200px;
        }

        .tiles-row {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }

        .slider-row {
            width: 100%; height: 350px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(0, 242, 255, 0.4);
            border-radius: 12px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.15);
        }

        .slider-row iframe { width: 100%; height: 100%; border: none; }

        .tile {
            position: relative; height: 120px; overflow: hidden;
            background: rgba(15, 15, 15, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px); border-radius: 8px;
            transition: 0.3s ease; cursor: pointer;
            text-decoration: none; display: block;
        }

        .tile:hover { transform: scale(1.03); border-color: #00f2ff; z-index: 20; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        .tile img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        
        .tile-info {
            position: absolute; bottom: 0; width: 100%; padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            color: #fff; box-sizing: border-box;
        }
        .tile-info h2 { margin: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }

        .c-green:hover { border-color: #00ff00; }
        .c-blue:hover { border-color: #00f2ff; }
        .c-red:hover { border-color: #ff4444; }

        @media (max-width: 700px) {
            .tiles-row { grid-template-columns: 1fr; }
            .slider-row { height: 450px; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui">
        <h1>COPA MILENIO</h1>
        
        <div class="layout-rows">
            <div class="tiles-row">
                <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_blank" class="tile c-green">
                    <img src="https://images.unsplash.com/photo-1574629810360-7efbbe195018?q=80&w=400">
                    <div class="tile-info"><h2>Juego</h2></div>
                </a>
                <div class="tile c-blue">
                    <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?q=80&w=400">
                    <div class="tile-info"><h2>Raíces</h2></div>
                </div>
                <a href="https://stage2-front.milenio.com/futbol-internacional/mundial/estadisticas" target="_blank" class="tile c-red">
                    <img src="https://images.unsplash.com/photo-1529900948632-5a63961744ad?q=80&w=400">
                    <div class="tile-info"><h2>Estadísticas</h2></div>
                </a>
            </div>

            <div class="slider-row">
                <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/Milenio-Deportes/Short-Deportes.html" allow="autoplay"></iframe>
            </div>

            <div class="tiles-row">
                <div class="tile c-green">
                    <a href="https://www.milenio.com/deportes/futbol-internacional/mundial" target="_blank" class="tile c-red">
                    <img src="https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=400">
                    <div class="tile-info"><h2>Sitio Web</h2></div>
                    </a>
                </div>
                <div class="tile c-red" id="video-btn">
                    <img src="https://images.unsplash.com/photo-1431324155629-1a6eda1eedfa?q=80&w=400">
                    <div class="tile-info"><h2>Videos (Playlist)</h2></div>
                </div>
                <div class="tile c-blue">
                    <img src="https://images.unsplash.com/photo-1560272564-c83b66b1ad12?q=80&w=400">
                    <div class="tile-info"><h2>Zona Fans</h2></div>
                </div>
            </div>
        </div>
    </div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>
    <script type="module">
        import * as THREE from 'three';

        // Evento Video Playlist
        document.getElementById('video-btn').addEventListener('click', () => {
            window.open(`https://www.youtube.com/watch?list=PLVsGsrV660j6Gj9RD5TW6cMvOGjwcpfUo`, '_blank');
        });

        // --- CONFIGURACIÓN DEL FONDO (ESTADIO) ---
        let scene, camera, renderer, clouds = [];
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 4, 14); // Cámara baja para ver el césped
            camera.lookAt(0, 0, -5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            const loader = new THREE.TextureLoader();
            
            // EL CÉSPED
            const grassTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg');
            grassTex.wrapS = grassTex.wrapT = THREE.RepeatWrapping;
            grassTex.repeat.set(8, 12);
            const grassMat = new THREE.MeshPhongMaterial({ map: grassTex, color: 0x1a331a });
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(100, 150), grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.y = -5;
            scene.add(grass);

            // LÍNEAS DE CAL (ESTÉTICAS)
            const createLine = (w, h, x, z) => {
                const geo = new THREE.PlaneGeometry(w, h);
                const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(x, -4.98, z);
                scene.add(mesh);
            };
            createLine(60, 0.25, 0, 0); // Línea central
            
            // Círculo central
            const circleGeo = new THREE.RingGeometry(8.8, 9, 64);
            const circleMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3, side: THREE.DoubleSide });
            const circle = new THREE.Mesh(circleGeo, circleMat);
            circle.rotation.x = -Math.PI / 2;
            circle.position.set(0, -4.98, 0);
            scene.add(circle);

            // LUCES
            scene.add(new THREE.AmbientLight(0xffffff, 0.4));
            const pLight = new THREE.PointLight(0x00f2ff, 2.5, 60);
            pLight.position.set(0, 15, 5);
            scene.add(pLight);

            // NUBES ATMOSFÉRICAS
            const cloudTex = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lensflare/lensflare0.png');
            for(let i=0; i<10; i++) {
                const cloud = new THREE.Mesh(
                    new THREE.PlaneGeometry(50, 50),
                    new THREE.MeshBasicMaterial({ map: cloudTex, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending })
                );
                cloud.position.set(Math.random()*120-60, Math.random()*25, Math.random()*-50);
                scene.add(cloud);
                clouds.push(cloud);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            clouds.forEach(c => {
                c.position.x += 0.015;
                if(c.position.x > 70) c.position.x = -70;
            });
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
