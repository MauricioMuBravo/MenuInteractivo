<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Mundial 2026 - Milenio</title>
    <style>
        :root { 
            --mex-green: #A0D825; --usa-blue: #2755D5; --can-red: #ED4866; --neon-cyan: #00f2ff;
        }
        
        /* 1. RESET Y ESTILOS BASE */
        html, body { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #000; color: #fff; font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        html { 
            background: #000 url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_ESTADIO.jpg') no-repeat center top / cover fixed;
        }

        body { 
            background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: relative; z-index: 10; width: 100%; max-width: 950px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .main-header-img { display: block; width: 100%; height: auto; margin-bottom: 30px; }

        /* 2. GRIDS DE TARJETAS */
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .card-wrapper { position: relative; cursor: pointer; transition: 0.3s; }
        .neon-frame { position: absolute; inset: 0; border: 2px solid rgba(255,255,255,0.1); border-radius: 20px; z-index: 3; }
        .card-content { 
            position: relative; height: 170px; border-radius: 18px; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-size: cover !important; background-position: center !important;
            text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .card-content::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.85)); z-index: 1; }
        .icon-shield { width: 60px; margin-bottom: 10px; position: relative; z-index: 2; }
        .card-content span { font-weight: bold; z-index: 2; letter-spacing: 1px; font-size: 0.85rem; text-transform: uppercase; }

        /* 3. BLOQUE FUTBOLITO (ESTILO CAPTURA) */
        .futbolito-main-container {
            position: relative; width: 100%; min-height: 480px;
            background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/FondoJuego.png') center/cover;
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden; margin-bottom: 40px; padding: 30px; box-sizing: border-box;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .game-header { position: relative; z-index: 10; }
        .game-header h2 { font-family: 'Arial Black', sans-serif; font-size: 2.2rem; margin: 0; color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .game-header p { margin: 5px 0 0; font-size: 1.1rem; opacity: 0.9; }

        /* Contenedor Inferior: Trivia y Botón Lado a Lado */
        .bottom-controls {
            display: flex; align-items: flex-end; justify-content: space-between;
            gap: 20px; z-index: 10; width: 100%;
        }

        .trivia-container { flex: 1.2; }
        .trivia-box {
            position: relative; width: 100%; background: rgba(0, 0, 0, 0.85); 
            border-radius: 15px; border: 1px solid rgba(255,255,255,0.2);
            padding: 15px; box-sizing: border-box; text-align: center;
        }

        .trivia-box h3 { font-size: 1rem; margin: 0 0 12px; text-transform: uppercase; line-height: 1.2; }
        .trivia-options { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        .option-btn { 
            padding: 6px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; 
            background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s; font-size: 0.8rem; 
        }

        /* Botón Juega Ahora con Zoom */
        .action-container { flex: 0.8; display: flex; justify-content: center; align-items: center; }
        .btn-juega-ahora {
            display: inline-block; cursor: pointer; transition: all 0.3s ease;
            animation: mini-zoom-pulse 1.8s infinite ease-in-out;
        }
        .btn-juega-ahora img { width: 280px; height: auto; display: block; filter: drop-shadow(0 0 15px rgba(255, 77, 77, 0.6)); }

        @keyframes mini-zoom-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        /* Portero Detrás (Z-INDEX BAJO) */
        .character-portrait { 
            position: absolute; bottom: 0; right: 0; height: 100%; 
            z-index: 1; pointer-events: none; opacity: 1; 
        }

        /* 4. SECCIONES EXTRA */
        .iframe-container { width: 100%; max-width: 920px; height: 420px; margin: 0 auto 40px auto; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 15px; overflow: hidden; display: flex; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-slider-iframe { width: 100%; height: 100%; border: none; }
        .reels-container { width: 100%; max-width: 950px; margin: 0 auto 40px auto; border-radius: 15px; overflow: hidden; }
        .reels-iframe { width: 100%; height: 650px; border: none; }

        /* ============================================================
           5. OPTIMIZACIÓN MOBILE (IGUAL A TU CAPTURA)
           ============================================================ */
        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
            
            .futbolito-main-container {
                min-height: 550px;
                padding: 20px;
            }

            .game-header h2 { font-size: 1.6rem; }

            .bottom-controls {
                flex-direction: column; /* Apilados pero manteniendo el estilo */
                align-items: center;
                gap: 15px;
            }

            .trivia-container { width: 100%; order: 1; }
            .action-container { width: 100%; order: 2; margin-top: 10px; }

            .btn-juega-ahora img { width: 240px; }

            .character-portrait {
                height: 380px; /* El portero se ve detrás */
                right: -30px;
                bottom: 0;
                opacity: 0.8;
            }
        }

        /* Fondos Tarjetas */
        .bg-1 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_1.png'); }
        .bg-2 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_2.png'); }
        .bg-3 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_3.png'); }
        .bg-4 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_4.png'); }
        .bg-5 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_5.png'); }
        .bg-6 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_6.png'); }
        .bg-7 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_7.png'); }
        .bg-8 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_8.png'); }
        .bg-9 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_9.png'); }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <audio id="select-audio" preload="auto">
        <source src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Button%20Selection%2005.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Logo2026M.png" class="main-header-img">

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/calendario')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield">
                    <span>CALENDARIO</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/estadisticas')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield">
                    <span>ESTADÍSTICAS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/temas/mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield">
                    <span>NOTICIAS</span>
                </div>
            </div>
        </div>

        <div class="futbolito-main-container">
            <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/portero.png" class="character-portrait">
            
            <div class="game-header">
                <h2>FUTBOLITO MILENIO</h2>
                <p>Solo para verdaderos aficionados.</p>
            </div>

            <div class="bottom-controls">
                <div class="trivia-container">
                    <div class="trivia-box">
                        <h3 id="question-text">¿QUIÉN MARCÓ EL PRIMER GOL DE LOS MUNDIALES?</h3>
                        <div class="trivia-options" id="options-container">
                            </div>
                    </div>
                </div>

                <div class="action-container">
                    <a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" class="btn-juega-ahora" onclick="playSelectSound()" target="_top">
                        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Juega_Ahora.png" alt="JUEGA AHORA">
                    </a>
                </div>
            </div>
        </div>

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/estadios-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-4">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadio.png" class="icon-shield">
                    <span>ESTADIOS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/figuras-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-5">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield">
                    <span>FIGURAS</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/seleccion-mexicana')">
                <div class="neon-frame"></div>
                <div class="card-content bg-6">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield">
                    <span>FIGURAS DE MÉXICO</span>
                </div>
            </div>
        </div>

        <div class="iframe-container">
            <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" class="video-slider-iframe" scrolling="no"></iframe>
        </div>

        <div class="grid-3">
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/historia-balones-mundiales')">
                <div class="neon-frame"></div>
                <div class="card-content bg-7">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_corriendo.png" class="icon-shield">
                    <span>BALONES</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/bracket-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-8">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_balones.png" class="icon-shield">
                    <span>BRACKET</span>
                </div>
            </div>
            <div class="card-wrapper" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol')">
                <div class="neon-frame"></div>
                <div class="card-content bg-9">
                    <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estrellas.png" class="icon-shield">
                    <span>VER MÁS</span>
                </div>
            </div>
        </div>

        <div class="reels-container">
            <iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/MIX/Videos-verticalesMenu.html" class="reels-iframe" scrolling="no"></iframe>
        </div>
    </div>

    <script>
        const selectSnd = document.getElementById('select-audio');
        const targetURL = "https://stage2-front.milenio.com/deportes/mundialito-milenio";

        function playSelectSound() { 
            try {
                const clone = new Audio(selectSnd.querySelector('source').src);
                clone.play().catch(() => {});
            } catch (e) {}
        }

        function handleNav(element, url) {
            playSelectSound();
            element.style.transform = "scale(0.95)";
            setTimeout(() => { window.top.location.href = url; }, 200);
        }

        const triviaPool = [
            { q: "¿QUIÉN MARCÓ EL PRIMER GOL DE LOS MUNDIALES?", opts: ["Laurent", "Stabile", "Nasazzi"] },
            { q: "¿PAÍS CON MÁS MUNDIALES GANADOS?", opts: ["Alemania", "Brasil", "Italia"] },
            { q: "¿QUIÉN MARCÓ EL 'GOL DEL SIGLO'?", opts: ["Pelé", "Maradona", "Zidane"] }
        ];

        let currentIndex = 0;
        function updateTrivia() {
            const qText = document.getElementById('question-text');
            const container = document.getElementById('options-container');
            if(!qText) return;

            const item = triviaPool[currentIndex];
            qText.innerText = item.q;
            container.innerHTML = "";

            item.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => { 
                    playSelectSound();
                    setTimeout(() => { window.top.location.href = targetURL; }, 300);
                };
                container.appendChild(btn);
            });
            currentIndex = (currentIndex + 1) % triviaPool.length;
        }

        setInterval(updateTrivia, 6000);
        window.addEventListener('load', updateTrivia);
    </script>
</body>
</html>
