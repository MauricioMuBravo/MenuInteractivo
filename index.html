<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menú Mundial 2026 - Milenio</title>
    <style>
        :root {
            --mex-green: #A0D825;
            --usa-blue: #2755D5;
            --can-red: #ED4866;
            --neon-cyan: #00f2ff;
        }

        /* NUEVA FORMA: LOADER QUE "SIEGUE" AL USUARIO */
        #loader {
            position: absolute; /* Para moverlo dinámicamente con JS */
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: #000;
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease;
        }

        .balon-bounce {
            width: 80px;
            height: auto;
            animation: bounce 0.6s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
            filter: drop-shadow(0 0 15px var(--mex-green));
        }

        .loader-text {
            margin-top: 25px;
            font-size: 1.2rem;
            letter-spacing: 5px;
            color: #fff;
            font-weight: bold;
            font-family: 'Arial', sans-serif;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-40px); }
        }

        .loader-hidden {
            opacity: 0 !important;
            visibility: hidden !important;
        }

        /* CUERPO Y FONDO */
        html {
            background: #000 url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_ESTADIO.jpg') no-repeat center top / cover fixed;
        }

        body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            backdrop-filter: blur(4px);
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        #ui {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
            padding: 80px 20px 20px 20px;
            box-sizing: border-box;
        }

        .main-header-img {
            display: block;
            width: 120%;
            max-width: 1100px;
            height: auto;
            margin: 0 auto 40px auto;
            transform: translateX(-8.5%);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        /* GRID Y TARJETAS */
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card-wrapper {
            position: relative;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .card-wrapper:hover { transform: translateY(-5px); }

        .neon-frame {
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            z-index: 3;
            transition: 0.3s;
        }

        .card-mex:hover .neon-frame { border-color: var(--mex-green); box-shadow: 0 0 15px var(--mex-green); }
        .card-usa:hover .neon-frame { border-color: var(--usa-blue); box-shadow: 0 0 15px var(--usa-blue); }
        .card-can:hover .neon-frame { border-color: var(--can-red); box-shadow: 0 0 15px var(--can-red); }

        .card-content {
            position: relative;
            height: 170px;
            border-radius: 18px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover !important;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-content::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.85));
            z-index: 1;
        }

        .icon-shield {
            width: 60px;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .card-content span {
            font-weight: bold;
            z-index: 2;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-align: center;
        }

        /* SECCIÓN JUEGO */
        .futbolito-main-container {
            position: relative;
            width: 100%;
            min-height: 480px;
            background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/FondoJuego.png') no-repeat center/cover;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
            margin-bottom: 40px;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .game-header h2 { font-size: 2rem; margin: 0; font-weight: bold; }
        .game-header p { margin: 5px 0 0; font-size: 1.1rem; }

        .bottom-controls {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            z-index: 10;
            width: 100%;
        }

        .trivia-box {
            position: relative;
            width: 100%;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 15px;
            border: 1px solid var(--neon-cyan);
            padding: 15px;
            text-align: center;
        }

        .option-btn {
            padding: 6px 12px;
            border: 1px solid var(--neon-cyan);
            border-radius: 20px;
            background: rgba(0, 242, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
            margin: 4px;
        }

        .btn-juega-ahora img {
            width: 280px;
            filter: drop-shadow(0 0 15px var(--can-red));
        }

        /* CONTENEDORES DE VIDEO */
        .video-wrapper {
            width: 100%;
            margin: 0 auto 40px;
            border-radius: 15px;
            overflow: hidden;
            isolation: isolate;
        }

        iframe { width: 100%; border: none; display: block; }

        /* CLASES DE FONDO */
        .bg-1 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_1.png'); }
        .bg-2 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_2.png'); }
        .bg-3 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_3.png'); }
        .bg-4 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_4.png'); }
        .bg-5 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_5.png'); }
        .bg-6 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_6.png'); }
        .bg-7 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_7.png'); }
        .bg-8 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_8.png'); }
        .bg-9 { background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Fondo_9.png'); }

        @media (max-width: 768px) {
            .grid-3 { grid-template-columns: 1fr; }
            .main-header-img { width: 100%; transform: none; }
            .futbolito-main-container {
                background: url('https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/FutbolitomilenioMobi.png') no-repeat center/cover;
            }
            .bottom-controls { flex-direction: column; align-items: center; }
            .btn-juega-ahora img { width: 220px; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Balon.png" class="balon-bounce">
        <div class="loader-text">CARGANDO.....</div>
    </div>

    <div id="particles-js"></div>
    <audio id="select-audio" preload="auto">
        <source src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Button%20Selection%2005.mp3" type="audio/mpeg">
    </audio>

    <div id="ui">
        <img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/Logo2026M.png" class="main-header-img">

        <div class="grid-3">
            <div class="card-wrapper card-mex" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/calendario')">
                <div class="neon-frame"></div>
                <div class="card-content bg-1"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_calendario.png" class="icon-shield"><span>CALENDARIO</span></div>
            </div>
            <div class="card-wrapper card-usa" onclick="handleNav(this, 'https://www.milenio.com/futbol-internacional/mundial/estadisticas')">
                <div class="neon-frame"></div>
                <div class="card-content bg-2"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadisticas.png" class="icon-shield"><span>ESTADÍSTICAS</span></div>
            </div>
            <div class="card-wrapper card-can" onclick="handleNav(this, 'https://www.milenio.com/temas/mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-3"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_noticias.png" class="icon-shield"><span>NOTICIAS</span></div>
            </div>
        </div>

        <div class="futbolito-main-container">
            <div class="game-header"><h2>FUTBOLITO MILENIO</h2><p>Solo para verdaderos aficionados.</p></div>
            <div class="bottom-controls">
                <div class="trivia-box"><h3 id="question-text" style="font-size: 1rem;">¿QUIÉN MARCÓ EL PRIMER GOL?</h3><div id="options-container"></div></div>
                <div class="action-container"><a href="https://stage2-front.milenio.com/deportes/mundialito-milenio" target="_top" class="btn-juega-ahora"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/Juega_Ahora.png"></a></div>
            </div>
        </div>

        <div class="grid-3">
            <div class="card-wrapper card-mex" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/estadios-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-4"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estadio.png" class="icon-shield"><span>ESTADIOS</span></div>
            </div>
            <div class="card-wrapper card-usa" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/figuras-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-5"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield"><span>FIGURAS</span></div>
            </div>
            <div class="card-wrapper card-can" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/seleccion-mexicana')">
                <div class="neon-frame"></div>
                <div class="card-content bg-6"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_leyendas.png" class="icon-shield"><span>FIGURAS MÉXICO</span></div>
            </div>
        </div>

        <div class="video-wrapper"><iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/SliderVideo.html" style="height: 480px;" scrolling="no"></iframe></div>

        <div class="grid-3">
            <div class="card-wrapper card-mex" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/historia-balones-mundiales')">
                <div class="neon-frame"></div>
                <div class="card-content bg-7"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_corriendo.png" class="icon-shield"><span>BALONES</span></div>
            </div>
            <div class="card-wrapper card-usa" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol/bracket-mundial-2026')">
                <div class="neon-frame"></div>
                <div class="card-content bg-8"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_balones.png" class="icon-shield"><span>BRACKET</span></div>
            </div>
            <div class="card-wrapper card-can" onclick="handleNav(this, 'https://www.milenio.com/deportes/futbol')">
                <div class="neon-frame"></div>
                <div class="card-content bg-9"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/IMGS/escudo_estrellas.png" class="icon-shield"><span>VER MÁS</span></div>
            </div>
        </div>

        <div class="video-wrapper"><iframe src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/Shorts/MIX/Videos-verticalesMenu.html" style="height:650px;" scrolling="no"></iframe></div>

        <div style="text-align: center; margin: 50px 0;"><img src="https://cdnpublicidad.milenio.com/2026/PublicidadOperaciones/MundialitoMilenio/Interactivo/CreditosInteractivo.png" style="max-width: 500px; width: 90%;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function updateLoaderPos() {
            const l = document.getElementById('loader');
            if(l) l.style.top = (window.pageYOffset || document.documentElement.scrollTop) + 'px';
        }
        window.addEventListener('scroll', updateLoaderPos);
        updateLoaderPos();

        window.addEventListener('load', () => { 
            setTimeout(() => { 
                document.getElementById('loader').classList.add('loader-hidden');
                window.removeEventListener('scroll', updateLoaderPos);
            }, 1000); 
        });

        const audio = document.getElementById('select-audio');
        function playSelectSound() { if(audio) { audio.pause(); audio.currentTime=0; audio.play().catch(()=>{}); } }
        function handleNav(element, url) { playSelectSound(); element.style.transform="scale(0.95)"; setTimeout(()=>{ window.top.location.href=url; }, 200); }
        
        particlesJS("particles-js", { "particles": { "number": { "value": 15 }, "color": { "value": "#00f2ff" }, "shape": { "type": "circle" }, "opacity": { "value": 0.3 }, "size": { "value": 4 }, "move": { "enable": true, "speed": 1.5 } } });
        
        const triviaPool = [{ q: "¿QUIÉN MARCÓ EL PRIMER GOL?", opts: ["Laurent", "Stabile", "Nasazzi"] }, { q: "¿MÁS MUNDIALES GANADOS?", opts: ["Alemania", "Brasil", "Italia"] }];
        let curIdx = 0;
        function updateTrivia() {
            const container = document.getElementById('options-container');
            const item = triviaPool[curIdx];
            document.getElementById('question-text').innerText = item.q;
            container.innerHTML = "";
            item.opts.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'option-btn'; btn.innerText = opt;
                btn.onclick = () => { playSelectSound(); setTimeout(() => { window.top.location.href = "https://stage2-front.milenio.com/deportes/mundialito-milenio"; }, 300); };
                container.appendChild(btn);
            });
            curIdx = (curIdx + 1) % triviaPool.length;
        }
        setInterval(updateTrivia, 6000); updateTrivia();
    </script>
</body>
</html>
